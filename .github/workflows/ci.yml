name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'Formula/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'Formula/**'
      - '.github/workflows/ci.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      formula:
        description: 'Specific formula to test (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - fparser
          - csxcad
          - qcsxcad
          - appcsxcad
          - openems
      build_bottles:
        description: 'Build bottles instead of regular test'
        required: false
        default: false
        type: boolean

env:
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1

jobs:
  # Detect which formulas changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      fparser: ${{ steps.filter.outputs.fparser }}
      csxcad: ${{ steps.filter.outputs.csxcad }}
      qcsxcad: ${{ steps.filter.outputs.qcsxcad }}
      appcsxcad: ${{ steps.filter.outputs.appcsxcad }}
      openems: ${{ steps.filter.outputs.openems }}
      any_changed: ${{ steps.filter.outputs.any_changed }}
      workflow_changed: ${{ steps.filter.outputs.workflow_changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            fparser:
              - 'Formula/fparser.rb'
            csxcad:
              - 'Formula/csxcad.rb'
            qcsxcad:
              - 'Formula/qcsxcad.rb'
            appcsxcad:
              - 'Formula/appcsxcad.rb'
            openems:
              - 'Formula/openems.rb'
            any_changed:
              - 'Formula/**'
            workflow_changed:
              - '.github/workflows/ci.yml'

  # Build and test on all macOS versions
  test-build:
    needs: detect-changes
    if: |
      github.event_name != 'release' && 
      (needs.detect-changes.outputs.any_changed == 'true' || needs.detect-changes.outputs.workflow_changed == 'true' || github.event_name == 'workflow_dispatch') && 
      (github.event_name != 'workflow_dispatch' || github.event.inputs.build_bottles != 'true')
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        run: |
          brew update

      - name: Tap local repo
        run: brew tap vinn-ie/openems file://$PWD

      - name: Install fparser
        if: >
          needs.detect-changes.outputs.fparser == 'true' ||
          needs.detect-changes.outputs.csxcad == 'true' ||
          needs.detect-changes.outputs.qcsxcad == 'true' ||
          needs.detect-changes.outputs.appcsxcad == 'true' ||
          needs.detect-changes.outputs.openems == 'true' ||
          github.event.inputs.formula == '' ||
          github.event.inputs.formula == 'fparser'
        run: brew install --build-from-source vinn-ie/openems/fparser

      - name: Install csxcad
        if: >
          needs.detect-changes.outputs.csxcad == 'true' ||
          needs.detect-changes.outputs.qcsxcad == 'true' ||
          needs.detect-changes.outputs.appcsxcad == 'true' ||
          needs.detect-changes.outputs.openems == 'true' ||
          github.event.inputs.formula == '' ||
          github.event.inputs.formula == 'csxcad'
        run: brew install --build-from-source vinn-ie/openems/csxcad

      - name: Install qcsxcad
        if: >
          needs.detect-changes.outputs.qcsxcad == 'true' ||
          needs.detect-changes.outputs.appcsxcad == 'true' ||
          needs.detect-changes.outputs.openems == 'true' ||
          github.event.inputs.formula == '' ||
          github.event.inputs.formula == 'qcsxcad'
        run: brew install --build-from-source vinn-ie/openems/qcsxcad

      - name: Install appcsxcad
        if: >
          needs.detect-changes.outputs.appcsxcad == 'true' ||
          needs.detect-changes.outputs.openems == 'true' ||
          github.event.inputs.formula == '' ||
          github.event.inputs.formula == 'appcsxcad'
        run: brew install --build-from-source vinn-ie/openems/appcsxcad

      - name: Install openems
        if: >
          needs.detect-changes.outputs.openems == 'true' ||
          github.event.inputs.formula == '' ||
          github.event.inputs.formula == 'openems'
        run: brew install --build-from-source vinn-ie/openems/openems

      - name: Set up Python environment
        if: >
          needs.detect-changes.outputs.openems == 'true' ||
          github.event.inputs.formula == '' ||
          github.event.inputs.formula == 'openems'
        run: |
          echo "=== Setting up Python environment ==="
          python3 -m venv ~/openems-env
          source ~/openems-env/bin/activate
          pip install --upgrade pip
          pip install cython numpy matplotlib h5py setuptools

          echo "=== Installing CSXCAD Python bindings ==="
          CSXCAD_INSTALL_PATH=$(brew --prefix csxcad) pip install git+https://github.com/thliebig/CSXCAD.git#subdirectory=python --no-build-isolation

          echo "=== Installing openEMS Python bindings ==="
          CSXCAD_INSTALL_PATH=$(brew --prefix csxcad) OPENEMS_INSTALL_PATH=$(brew --prefix openems) pip install git+https://github.com/thliebig/openEMS.git#subdirectory=python --no-build-isolation

      - name: Run Simple Patch Antenna tutorial
        if: >
          needs.detect-changes.outputs.openems == 'true' ||
          github.event.inputs.formula == '' ||
          github.event.inputs.formula == 'openems'
        run: |
          source ~/openems-env/bin/activate
          echo "=== Downloading Simple Patch Antenna tutorial ==="
          curl -LO https://raw.githubusercontent.com/thliebig/openEMS/master/python/Tutorials/Simple_Patch_Antenna.py
          
          echo "=== Running tutorial to completion ==="
          python Simple_Patch_Antenna.py
          
          echo "=== Verifying plot files were generated ==="
          if ls -1 *.png 2>/dev/null | grep -q .; then
            echo "✅ Plot files generated:"
            ls -lh *.png
          else
            echo "❌ No plot files found!"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          echo "=== Cleaning up temporary files ==="
          rm -f Simple_Patch_Antenna.py *.png *.h5

  # Build bottles on release
  build-bottles:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_bottles == 'true')
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        run: |
          brew update

      - name: Tap local repo
        run: brew tap vinn-ie/openems file://$PWD

      - name: Build bottles
        run: |
          echo "=== Setting up bottles directory ==="
          mkdir -p ./bottles
          
          for formula in fparser csxcad qcsxcad appcsxcad openems; do
            echo "==========================================" 
            echo "=== Building bottle for $formula ==="
            echo "==========================================" 
            
            # Install with --build-bottle flag
            if ! brew install --build-bottle "vinn-ie/openems/$formula"; then
              echo "❌ Failed to install $formula for bottling"
              exit 1
            fi
            
            # Create bottle - run from bottles directory
            echo "=== Creating bottle ==="
            cd ./bottles
            if ! brew bottle --json --root-url "https://github.com/vinn-ie/homebrew-openems/releases/download/${{ github.ref_name }}" "vinn-ie/openems/$formula"; then
              echo "❌ Failed to create bottle for $formula"
              cd ..
              exit 1
            fi

            # Move generated artifacts into a subdirectory per OS to avoid filename collisions
            mkdir -p ../bottles/${{ matrix.os }}
            mv ./*.json ../bottles/${{ matrix.os }}/ 2>/dev/null || true
            mv ./*.tar.gz ../bottles/${{ matrix.os }}/ 2>/dev/null || true
            cd ..

            echo "=== Bottles directory after $formula ==="
            ls -la ./bottles/${{ matrix.os }} || true
          done
          
          echo "=========================================="
          echo "=== Final bottles directory ==="
          echo "=========================================="
          ls -la ./bottles/
          
          echo "=== Counting files ==="
          echo "tar.gz files: $(find ./bottles -name '*.tar.gz' | wc -l)"
          echo "json files: $(find ./bottles -name '*.json' | wc -l)"

      - name: Verify bottles were created
        run: |
          # Search for bottle files across OS subdirectories
          bottle_count=$(find ./bottles -type f -name "*.bottle*.tar.gz" | wc -l)
          if [ "$bottle_count" -eq 0 ]; then
            echo "❌ FATAL: No bottle tar.gz files were created!"
            echo "=== Current directory contents ==="
            ls -la ./bottles || true
            echo "=== Checking Homebrew cache ==="
            ls -la $(brew --cache) 2>/dev/null || echo "Cache not accessible"
            echo "=== Checking for bottles in Homebrew Cellar ==="
            find $(brew --cellar) -name "*.bottle*" 2>/dev/null || echo "None found"
            exit 1
          fi
          echo "✅ Found $bottle_count bottle file(s)"
          find ./bottles -type f -name "*.bottle*.tar.gz" -print -exec ls -lh {} \;

      - name: Upload bottles
        uses: actions/upload-artifact@v4
        with:
          name: bottles-${{ matrix.os }}
          path: ./bottles/${{ matrix.os }}/*.bottle*.tar.gz
          if-no-files-found: error

      - name: Upload bottle JSON
        uses: actions/upload-artifact@v4
        with:
          name: bottle-json-${{ matrix.os }}
          path: ./bottles/${{ matrix.os }}/*.json
          if-no-files-found: error

      - name: Cleanup bottles
        if: always()
        run: |
          echo "=== Cleaning up bottle build artifacts ==="
          rm -rf ./bottles

  # Test bottles after they're built
  test-bottles:
    needs: update-formulas
    if: github.event_name == 'release'
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Pull latest formula changes
        run: git pull origin ${{ github.event.repository.default_branch }}

      - name: Checkout PR branch if present
        id: check_branch
        run: |
          set -euo pipefail
          branch="bottle-updates/${{ github.ref_name }}"
          echo "Checking for remote branch $branch"
          git fetch origin "$branch" || true
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "Found $branch on origin — checking out"
            git fetch origin "$branch":"$branch"
            git checkout "$branch"
            echo "branch_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "branch_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Homebrew
        run: |
          brew update

      - name: Add tap
        run: |
          brew tap vinn-ie/openems
          # List formulas in the tap repository (avoid invalid brew option)
          if repo_path=$(brew --repo vinn-ie/openems 2>/dev/null); then
            echo "Listing Formula/ in $repo_path"
            ls -la "$repo_path/Formula" || true
          else
            echo "Could not determine tap repo path"
          fi

      - name: Verify bottle blocks exist in formulas
        run: |
          echo "=== Checking bottle blocks in formulas ==="
          # Map matrix OS to expected bottle platform and only check that one.
          case "${{ matrix.os }}" in
            macos-14) expected_platform="arm64_sequoia" ;;
            macos-15) expected_platform="arm64_sonoma" ;;
            macos-26) expected_platform="arm64_tahoe" ;;
            *) expected_platform="arm64_sequoia" ;;
          esac

          echo "Expected platform for this job: $expected_platform"
          for formula in fparser csxcad qcsxcad appcsxcad openems; do
            echo "--- $formula ---"
            if grep -q "bottle do" "Formula/${formula}.rb"; then
              echo "✅ Bottle block found in $formula"
              bottle_block=$(sed -n '/bottle do/,/end/p' "Formula/${formula}.rb" || true)
              if echo "$bottle_block" | grep -q "$expected_platform"; then
                echo "  ✅ $expected_platform entry present"
              else
                echo "  ❌ Missing $expected_platform entry in $formula"
                exit 1
              fi
              echo "$bottle_block"
            else
              echo "❌ No bottle block in $formula"
              exit 1
            fi
          done

      - name: Install formulas and verify bottles are used
        run: |
          echo "=== Installing formulas (should use bottles) ==="
          for formula in fparser csxcad qcsxcad appcsxcad openems; do
            echo "--- Installing $formula ---"
            
            # Install the formula from the tap (do not use @version suffix)
            echo "Installing $formula"
            install_output=$(brew install "vinn-ie/openems/$formula" 2>&1) || true
            echo "$install_output"
            
            # Check if it was poured from bottle (not built from source)
            if echo "$install_output" | grep -q "Pouring"; then
              echo "✅ $formula installed from bottle"
            elif echo "$install_output" | grep -q "already installed"; then
              echo "ℹ️  $formula was already installed"
              # Reinstall to verify bottle
              reinstall_output=$(brew reinstall "vinn-ie/openems/$formula" 2>&1) || true
              echo "$reinstall_output"
              if echo "$reinstall_output" | grep -q "Pouring"; then
                echo "✅ $formula reinstalled from bottle"
              else
                echo "⚠️  Could not verify bottle for $formula (may have built from source)"
              fi
            else
              echo "⚠️  $formula may have been built from source"
              # Don't fail - bottle might not be available for this OS
            fi
          done  

      - name: Smoketest - openEMS CLI
        run: |
          echo "=== Testing openEMS CLI ==="
          openEMS --help || true
          echo "=== Running test simulation ==="
          openEMS examples/test.xml --debug-PEC

      - name: Smoketest - Python bindings
        run: |
          echo "=== Setting up Python environment ==="
          python3 -m venv ~/openems-env
          source ~/openems-env/bin/activate
          pip install --upgrade pip
          pip install cython numpy matplotlib h5py setuptools

          echo "=== Installing CSXCAD Python bindings ==="
          CSXCAD_INSTALL_PATH=$(brew --prefix csxcad) pip install git+https://github.com/thliebig/CSXCAD.git#subdirectory=python --no-build-isolation

          echo "=== Installing openEMS Python bindings ==="
          CSXCAD_INSTALL_PATH=$(brew --prefix csxcad) OPENEMS_INSTALL_PATH=$(brew --prefix openems) pip install git+https://github.com/thliebig/openEMS.git#subdirectory=python --no-build-isolation

          echo "=== Running Python test ==="
          python examples/test_python.py

      - name: Merge bottle-updates PR into default branch (if tests passed and PR exists)
        if: steps.check_branch.outputs.branch_found == 'true'
        env:
          # Use a personal access token if provided in repository secrets as
          # PERSONAL_ACCESS_TOKEN. This is necessary when workflow runs originate
          # from forks, because the default GITHUB_TOKEN has limited permissions.
          GITHUB_API_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          BRANCH: "bottle-updates/${{ github.ref_name }}"
        run: |
          set -euo pipefail
          echo "Looking for PR for branch $BRANCH"
          prs=$(curl -s -H "Authorization: Bearer $GITHUB_API_TOKEN" "https://api.github.com/repos/$REPO/pulls?head=${OWNER}:${BRANCH}&state=open")
          pr_number=$(echo "$prs" | python3 -c 'import sys,json; js=json.load(sys.stdin); print(js[0]["number"] if js else "")')
          if [ -z "$pr_number" ]; then
            echo "No open PR found for $BRANCH; nothing to merge"
            exit 0
          fi
          echo "Merging PR #$pr_number"
          resp=$(curl -s -X PUT -H "Authorization: Bearer $GITHUB_API_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$REPO/pulls/$pr_number/merge" -d '{"merge_method":"merge"}')
          echo "$resp"
          if echo "$resp" | python3 -c "import sys,json; j=json.load(sys.stdin); print(j.get('merged', False))" | grep -q True; then
            echo "PR #$pr_number merged"
          else
            echo "Failed to merge PR #$pr_number or it was merged already"
          fi

  # Upload bottles to release
  upload-release-bottles:
    needs: build-bottles
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all bottles
        uses: actions/download-artifact@v4
        with:
          pattern: bottles-*
          path: ./bottles
          merge-multiple: true

      - name: Download all bottle JSONs
        uses: actions/download-artifact@v4
        with:
          pattern: bottle-json-*
          path: ./bottle-json
          merge-multiple: true

      - name: Verify downloaded JSONs contain all platforms
        run: |
          echo "=== Available JSON files ==="
          ls -la ./bottle-json || true

          required_platforms=("arm64_sequoia" "arm64_sonoma" "arm64_tahoe")
          missing=0
          for platform in "${required_platforms[@]}"; do
            if ! ls ./bottle-json/*${platform}*.json >/dev/null 2>&1; then
              echo "❌ Missing JSON files for platform: $platform"
              missing=1
            else
              echo "✅ Found JSON files for platform: $platform"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "FATAL: Not all platform JSON artifacts are present. Aborting."
            exit 1
          fi

      - name: Verify bottle integrity
        run: |
          echo "=== Verifying bottle files ==="
          cd ./bottles
          
          # Check that all bottles have corresponding JSON files
          for bottle_file in *.bottle*.tar.gz; do
            json_file="${bottle_file%.tar.gz}.json"
            if [ ! -f "../bottle-json/$json_file" ]; then
              echo "❌ Missing JSON file for bottle: $bottle_file"
              exit 1
            fi
            echo "✅ Found JSON for $bottle_file"
          done
          
          # Basic JSON validation
          for json_file in ../bottle-json/*.json; do
            if ! python3 -m json.tool "$json_file" > /dev/null 2>&1; then
              echo "❌ Invalid JSON in $json_file"
              exit 1
            fi
            echo "✅ Valid JSON: $(basename "$json_file")"
          done
          
          echo "=== Bottle integrity check passed ==="

      - name: Upload bottles to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./bottles/*.bottle*.tar.gz
            ./bottle-json/*.json

  # Update formulas with bottle blocks
  update-formulas:
    needs: upload-release-bottles
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_bottles == 'true')
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all bottle JSONs
        uses: actions/download-artifact@v4
        with:
          pattern: bottle-json-*
          path: ./bottle-json
          merge-multiple: true

      - name: Set up Homebrew
        run: |
          brew update
          brew tap vinn-ie/openems file://$PWD

      - name: Merge bottle info into formulas
        run: |
          echo "=== Available JSON files ==="
          ls -la ./bottle-json/ || true

          echo "=== Merging bottle blocks into formulas (in temporary copy) ==="
          ORIG_DIR=$(pwd)
          TMPDIR=$(mktemp -d)
          echo "Using temp dir: $TMPDIR"

          # Copy repository contents to temp dir but remove git metadata so
          # brew bottle --merge cannot commit. We'll run all merges there and
          # then copy back modified Formula files.
          rsync -a --exclude='.git' "$ORIG_DIR/" "$TMPDIR/"
          cd "$TMPDIR"

          # Ensure the temp repo is a tap for brew to operate on
          brew tap --force-auto-update --repair || true
          brew tap vinn-ie/openems file://$PWD || true

          # For each formula, combine its JSON files into one array JSON and
          # run `brew bottle --merge` once. This prevents per-file sequential
          # overwrites and ensures all platform entries are merged together.
          find "$ORIG_DIR/bottle-json" -type f -name '*.json' -print0 | \
            xargs -0 -n1 basename | sed -E 's/(.+)--.+\.arm64_.+\.bottle\.json/\1/' | sort -u | while read -r formula; do
            echo "=== Merging JSONs for formula: $formula ==="
            tmp_combined="/tmp/${formula}-combined.json"
            python3 - <<PY > "$tmp_combined"
import sys, json, glob, os
orig = os.environ['ORIG_DIR']
pattern = os.path.join(orig, 'bottle-json', f'{formula}--*.json')
files = sorted(glob.glob(pattern))
combined = []
for f in files:
    try:
        data = json.load(open(f))
        if isinstance(data, list):
            combined.extend(data)
        else:
            combined.append(data)
    except Exception as e:
        print(f'Failed to load {f}: {e}', file=sys.stderr)
        sys.exit(2)
json.dump(combined, sys.stdout)
PY
            echo "Processing combined JSON: $tmp_combined"
            if [ ! -s "$tmp_combined" ]; then
              echo "No combined JSON for $formula (skipping)"
              continue
            fi
            if ! brew bottle --merge "$tmp_combined" --write; then
              echo "❌ Failed to merge combined bottle info for $formula"
              cat "$tmp_combined" || true
              exit 1
            fi
          done

          # Copy back modified Formula files to original checkout
          echo "Copying updated Formula files back to repository"
          cp -a "$TMPDIR/Formula/"* "$ORIG_DIR/Formula/" || true
          cd "$ORIG_DIR"
          rm -rf "$TMPDIR"
          
          echo "=== Updated formulas ==="
          git diff Formula/

      - name: Commit updated formulas (no push)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Ensure any generated artifact directories (e.g. bottle-json/) are
          # not staged accidentally.
          git rm -r --cached --ignore-unmatch ./bottle-json || true

          git add Formula/*.rb || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "=== Debug: current Formula checksums ==="
            for f in Formula/*.rb; do
              if command -v shasum >/dev/null 2>&1; then
                shasum -a 256 "$f" || true
              else
                openssl dgst -sha256 "$f" || true
              fi
            done
            echo "=== Debug: show Formula files (first 200 lines each) ==="
            for f in Formula/*.rb; do
              echo "--- $f ---"
              sed -n '1,200p' "$f" || true
            done
            # Create a debug archive for upload in the next step
            tar -czf "$GITHUB_WORKSPACE/formula-debug.tar.gz" Formula || true
          else
            git commit -m "Update bottle blocks for ${{ github.ref_name }} [skip ci]"
          fi

      - name: Create or update pull request for bottle updates
        uses: peter-evans/create-pull-request@v5
        with:
          # Prefer a personal access token stored in secrets.PERSONAL_ACCESS_TOKEN.
          # This is required for workflows triggered from forks where the
          # default GITHUB_TOKEN can't create cross-repository PRs.
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          title: "Update bottle blocks for ${{ github.ref_name }}"
          body: "Automated bottle block updates for ${{ github.ref_name }}."
          base: ${{ github.event.repository.default_branch }}
          branch: "bottle-updates/${{ github.ref_name }}"
          commit-message: "[create-pull-request] automated change"
          draft: false

      - name: Upload debug formulas (if present)
        uses: actions/upload-artifact@v4
        with:
          name: formula-debug
          path: ./formula-debug.tar.gz
          if-no-files-found: ignore