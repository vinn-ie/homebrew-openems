name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'Formula/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'Formula/**'
      - '.github/workflows/ci.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      formula:
        description: 'Specific formula to test (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - fparser
          - csxcad
          - qcsxcad
          - appcsxcad
          - openems
      build_bottles:
        description: 'Build bottles instead of regular test'
        required: false
        default: false
        type: boolean

env:
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1

jobs:
  # Detect which formulas changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      fparser: ${{ steps.filter.outputs.fparser }}
      csxcad: ${{ steps.filter.outputs.csxcad }}
      qcsxcad: ${{ steps.filter.outputs.qcsxcad }}
      appcsxcad: ${{ steps.filter.outputs.appcsxcad }}
      openems: ${{ steps.filter.outputs.openems }}
      any_changed: ${{ steps.filter.outputs.any_changed }}
      workflow_changed: ${{ steps.filter.outputs.workflow_changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            fparser:
              - 'Formula/fparser.rb'
            csxcad:
              - 'Formula/csxcad.rb'
            qcsxcad:
              - 'Formula/qcsxcad.rb'
            appcsxcad:
              - 'Formula/appcsxcad.rb'
            openems:
              - 'Formula/openems.rb'
            any_changed:
              - 'Formula/**'
            workflow_changed:
              - '.github/workflows/ci.yml'

  # Build and test on all macOS versions
  test-build:
    needs: detect-changes
    if: (needs.detect-changes.outputs.any_changed == 'true' || needs.detect-changes.outputs.workflow_changed == 'true' || github.event_name == 'workflow_dispatch') && github.event.inputs.build_bottles != 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        run: |
          brew update
          brew doctor || true

      - name: Tap local repo
        run: brew tap vincentfree/openems file://$PWD

      - name: Install fparser
        if: >
          needs.detect-changes.outputs.fparser == 'true' ||
          needs.detect-changes.outputs.csxcad == 'true' ||
          needs.detect-changes.outputs.qcsxcad == 'true' ||
          needs.detect-changes.outputs.appcsxcad == 'true' ||
          needs.detect-changes.outputs.openems == 'true' ||
          github.event.inputs.formula == '' ||
          github.event.inputs.formula == 'fparser'
        run: brew install --build-from-source vincentfree/openems/fparser

      - name: Install csxcad
        if: >
          needs.detect-changes.outputs.csxcad == 'true' ||
          needs.detect-changes.outputs.qcsxcad == 'true' ||
          needs.detect-changes.outputs.appcsxcad == 'true' ||
          needs.detect-changes.outputs.openems == 'true' ||
          github.event.inputs.formula == '' ||
          github.event.inputs.formula == 'csxcad'
        run: brew install --build-from-source vincentfree/openems/csxcad

      - name: Install qcsxcad
        if: >
          needs.detect-changes.outputs.qcsxcad == 'true' ||
          needs.detect-changes.outputs.appcsxcad == 'true' ||
          needs.detect-changes.outputs.openems == 'true' ||
          github.event.inputs.formula == '' ||
          github.event.inputs.formula == 'qcsxcad'
        run: brew install --build-from-source vincentfree/openems/qcsxcad

      - name: Install appcsxcad
        if: >
          needs.detect-changes.outputs.appcsxcad == 'true' ||
          needs.detect-changes.outputs.openems == 'true' ||
          github.event.inputs.formula == '' ||
          github.event.inputs.formula == 'appcsxcad'
        run: brew install --build-from-source vincentfree/openems/appcsxcad

      - name: Install openems
        if: >
          needs.detect-changes.outputs.openems == 'true' ||
          github.event.inputs.formula == '' ||
          github.event.inputs.formula == 'openems'
        run: brew install --build-from-source vincentfree/openems/openems

      - name: Smoketest - openEMS CLI
        if: >
          needs.detect-changes.outputs.openems == 'true' ||
          github.event.inputs.formula == '' ||
          github.event.inputs.formula == 'openems'
        run: |
          echo "=== Testing openEMS CLI ==="
          openEMS --help || true
          echo "=== Running test simulation ==="
          openEMS examples/test.xml --debug-PEC

      - name: Smoketest - Python bindings
        if: >
          needs.detect-changes.outputs.openems == 'true' ||
          github.event.inputs.formula == '' ||
          github.event.inputs.formula == 'openems'
        run: |
          echo "=== Setting up Python environment ==="
          python3 -m venv ~/openems-env
          source ~/openems-env/bin/activate
          pip install --upgrade pip
          pip install cython numpy matplotlib h5py setuptools

          echo "=== Installing CSXCAD Python bindings ==="
          CSXCAD_INSTALL_PATH=$(brew --prefix csxcad) pip install git+https://github.com/thliebig/CSXCAD.git#subdirectory=python --no-build-isolation

          echo "=== Installing openEMS Python bindings ==="
          CSXCAD_INSTALL_PATH=$(brew --prefix csxcad) OPENEMS_INSTALL_PATH=$(brew --prefix openems) pip install git+https://github.com/thliebig/openEMS.git#subdirectory=python --no-build-isolation

          echo "=== Running Python test ==="
          python examples/test_python.py

      - name: Smoketest - Run tutorial example
        if: >
          needs.detect-changes.outputs.openems == 'true' ||
          github.event.inputs.formula == '' ||
          github.event.inputs.formula == 'openems'
        continue-on-error: true
        run: |
          source ~/openems-env/bin/activate
          echo "=== Downloading Simple Patch Antenna tutorial ==="
          curl -LO https://raw.githubusercontent.com/thliebig/openEMS/master/python/Tutorials/Simple_Patch_Antenna.py
          echo "=== Running tutorial (limited timesteps for CI) ==="
          # Modify to run fewer timesteps for faster CI
          sed -i '' 's/NrTS=.*/NrTS=1000,/g' Simple_Patch_Antenna.py 2>/dev/null || true
          # Use Python's built-in timeout since macOS doesn't have GNU timeout
          python3 << 'PYTHON_SCRIPT' || echo "Tutorial completed or timed out"
          import subprocess
          import sys
          try:
              result = subprocess.run([sys.executable, 'Simple_Patch_Antenna.py'], timeout=300)
              sys.exit(result.returncode)
          except subprocess.TimeoutExpired:
              print('Tutorial timed out after 300s')
              sys.exit(0)
          except Exception as e:
              print(f'Tutorial error: {e}')
              sys.exit(0)
          PYTHON_SCRIPT

  # Build bottles on release
  build-bottles:
    if: github.event_name == 'release' || github.event.inputs.build_bottles == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        run: |
          brew update
          brew doctor || true

      - name: Tap local repo
        run: brew tap vincentfree/openems file://$PWD

      - name: Build bottles
        run: |
          mkdir -p ./bottles
          
          for formula in fparser csxcad qcsxcad appcsxcad openems; do
            echo "=========================================="
            echo "=== Building bottle for $formula ==="
            echo "=========================================="
            
            # Install with --build-bottle flag
            brew install --build-bottle "vincentfree/openems/$formula"
            
            # Create bottle - run from bottles directory
            echo "=== Creating bottle ==="
            cd ./bottles
            brew bottle --json --root-url "https://github.com/vincentfree/homebrew-openems/releases/download/${{ github.ref_name }}" "vincentfree/openems/$formula"
            cd ..
            
            echo "=== Bottles directory after $formula ==="
            ls -la ./bottles/
          done
          
          echo "=========================================="
          echo "=== Final bottles directory ==="
          echo "=========================================="
          ls -la ./bottles/
          
          echo "=== Counting files ==="
          echo "tar.gz files: $(find ./bottles -name '*.tar.gz' | wc -l)"
          echo "json files: $(find ./bottles -name '*.json' | wc -l)"

      - name: Verify bottles were created
        run: |
          cd ./bottles
          # Match bottles with rebuild numbers: *.bottle.tar.gz OR *.bottle.N.tar.gz
          bottle_count=$(ls -1 *.bottle*.tar.gz 2>/dev/null | wc -l)
          if [ "$bottle_count" -eq 0 ]; then
            echo "❌ FATAL: No bottle tar.gz files were created!"
            echo "=== Current directory contents ==="
            ls -la
            echo "=== Checking Homebrew cache ==="
            ls -la $(brew --cache) 2>/dev/null || echo "Cache not accessible"
            echo "=== Checking for bottles in Homebrew Cellar ==="
            find $(brew --cellar) -name "*.bottle*" 2>/dev/null || echo "None found"
            exit 1
          fi
          echo "✅ Found $bottle_count bottle file(s)"
          ls -la *.bottle*.tar.gz

      - name: Upload bottles
        uses: actions/upload-artifact@v4
        with:
          name: bottles-${{ matrix.os }}
          path: ./bottles/*.bottle*.tar.gz
          if-no-files-found: error

      - name: Upload bottle JSON
        uses: actions/upload-artifact@v4
        with:
          name: bottle-json-${{ matrix.os }}
          path: ./bottles/*.json
          if-no-files-found: warn

  # Test bottles after they're built
  test-bottles:
    needs: build-bottles
    if: github.event_name == 'release' || github.event.inputs.build_bottles == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download bottles
        uses: actions/download-artifact@v4
        with:
          pattern: bottles-*
          path: ./bottles
          merge-multiple: true

      - name: Debug - List downloaded files
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Directory listing ==="
          ls -la
          echo "=== Bottles directory ==="
          if [ -d "./bottles" ]; then
            ls -la ./bottles/
            echo "=== All bottle files ==="
            find ./bottles -name "*.bottle*.tar.gz" -o -name "*.json" 2>/dev/null || echo "No files found"
          else
            echo "❌ ERROR: bottles directory does not exist!"
            echo "=== Looking for artifacts elsewhere ==="
            find . -name "*.bottle*.tar.gz" 2>/dev/null || echo "No bottle files found anywhere"
            exit 1
          fi

      - name: Verify bottles exist
        run: |
          if [ ! -d "./bottles" ]; then
            echo "❌ FATAL: Bottles directory not found!"
            exit 1
          fi
          
          bottle_count=$(find ./bottles -name "*.bottle*.tar.gz" 2>/dev/null | wc -l)
          if [ "$bottle_count" -eq 0 ]; then
            echo "❌ FATAL: No bottle files found in ./bottles/"
            ls -la ./bottles/
            exit 1
          fi
          
          echo "✅ Found $bottle_count bottle file(s)"
          ls -la ./bottles/*.bottle*.tar.gz

      - name: Set up Homebrew
        run: |
          brew update
          brew doctor || true

      - name: Tap local repo
        run: brew tap vincentfree/openems file://$PWD

      - name: Determine OS tag
        id: os-tag
        run: |
          case "${{ matrix.os }}" in
            macos-14) echo "tag=arm64_sonoma" >> $GITHUB_OUTPUT ;;
            macos-15) echo "tag=arm64_sequoia" >> $GITHUB_OUTPUT ;;
            macos-latest) echo "tag=arm64_sequoia" >> $GITHUB_OUTPUT ;;
          esac

      - name: Install bottles
        run: |
          cd ./bottles
          
          for formula in fparser csxcad qcsxcad appcsxcad openems; do
            bottle_file=$(ls ${formula}--*.${{ steps.os-tag.outputs.tag }}.bottle*.tar.gz 2>/dev/null | head -1 || true)
            if [ -z "$bottle_file" ]; then
              bottle_file=$(ls ${formula}--*.arm64_*.bottle*.tar.gz 2>/dev/null | head -1 || true)
            fi
            
            if [ -n "$bottle_file" ] && [ -f "$bottle_file" ]; then
              echo "=== Installing $formula from bottle: $bottle_file ==="
              brew install --force "$bottle_file"
            else
              echo "❌ FATAL: No bottle found for $formula on ${{ matrix.os }}"
              echo "Available bottles:"
              ls -la *.bottle*.tar.gz 2>/dev/null || echo "No bottles at all!"
              exit 1
            fi
          done

      - name: Smoketest bottles - openEMS CLI
        run: |
          echo "=== Testing openEMS CLI ==="
          openEMS --help || true
          echo "=== Running test simulation ==="
          openEMS examples/test.xml --debug-PEC

      - name: Smoketest bottles - Python bindings
        run: |
          echo "=== Setting up Python environment ==="
          python3 -m venv ~/openems-env
          source ~/openems-env/bin/activate
          pip install --upgrade pip
          pip install cython numpy matplotlib h5py setuptools

          echo "=== Installing CSXCAD Python bindings ==="
          CSXCAD_INSTALL_PATH=$(brew --prefix csxcad) pip install git+https://github.com/thliebig/CSXCAD.git#subdirectory=python --no-build-isolation

          echo "=== Installing openEMS Python bindings ==="
          CSXCAD_INSTALL_PATH=$(brew --prefix csxcad) OPENEMS_INSTALL_PATH=$(brew --prefix openems) pip install git+https://github.com/thliebig/openEMS.git#subdirectory=python --no-build-isolation

          echo "=== Running Python test ==="
          python examples/test_python.py

      - name: Smoketest bottles - Run tutorial example
        continue-on-error: true
        run: |
          source ~/openems-env/bin/activate
          echo "=== Downloading Simple Patch Antenna tutorial ==="
          curl -LO https://raw.githubusercontent.com/thliebig/openEMS/master/python/Tutorials/Simple_Patch_Antenna.py
          echo "=== Running tutorial (limited timesteps for CI) ==="
          sed -i '' 's/NrTS=.*/NrTS=1000,/g' Simple_Patch_Antenna.py 2>/dev/null || true
          # Use Python's built-in timeout since macOS doesn't have GNU timeout
          python3 << 'PYTHON_SCRIPT' || echo "Tutorial completed or timed out"
          import subprocess
          import sys
          try:
              result = subprocess.run([sys.executable, 'Simple_Patch_Antenna.py'], timeout=300)
              sys.exit(result.returncode)
          except subprocess.TimeoutExpired:
              print('Tutorial timed out after 300s')
              sys.exit(0)
          except Exception as e:
              print(f'Tutorial error: {e}')
              sys.exit(0)
          PYTHON_SCRIPT

  # Upload bottles to release
  upload-release-bottles:
    needs: test-bottles
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all bottles
        uses: actions/download-artifact@v4
        with:
          pattern: bottles-*
          path: ./bottles
          merge-multiple: true

      - name: Download all bottle JSONs
        uses: actions/download-artifact@v4
        with:
          pattern: bottle-json-*
          path: ./bottle-json
          merge-multiple: true

      - name: Upload bottles to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./bottles/*.bottle*.tar.gz
            ./bottle-json/*.json

  # Update formulas with bottle blocks
  update-formulas:
    needs: upload-release-bottles
    if: github.event_name == 'release'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all bottle JSONs
        uses: actions/download-artifact@v4
        with:
          pattern: bottle-json-*
          path: ./bottle-json
          merge-multiple: true

      - name: Set up Homebrew
        run: |
          brew update
          brew tap vincentfree/openems file://$PWD

      - name: Merge bottle info into formulas
        run: |
          echo "=== Available JSON files ==="
          ls -la ./bottle-json/
          
          echo "=== Merging bottle blocks into formulas ==="
          for json_file in ./bottle-json/*.json; do
            echo "Processing: $json_file"
            brew bottle --merge "$json_file" --write --no-commit
          done
          
          echo "=== Updated formulas ==="
          git diff Formula/

      - name: Commit and push updated formulas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Formula/*.rb
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update bottle blocks for ${{ github.ref_name }}"
            git push
          fi

  # Verify bottles are used by default after formula updates
  verify-bottle-install:
    needs: update-formulas
    if: github.event_name == 'release'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Pull latest formula changes
        run: git pull origin ${{ github.event.repository.default_branch }}

      - name: Set up Homebrew
        run: |
          brew update
          brew doctor || true

      - name: Tap local repo with updated formulas
        run: brew tap vincentfree/openems file://$PWD

      - name: Verify bottle blocks exist in formulas
        run: |
          echo "=== Checking bottle blocks in formulas ==="
          for formula in fparser csxcad qcsxcad appcsxcad openems; do
            echo "--- $formula ---"
            if grep -q "bottle do" Formula/${formula}.rb; then
              echo "✅ Bottle block found in $formula"
              grep -A 10 "bottle do" Formula/${formula}.rb
            else
              echo "❌ No bottle block in $formula"
              exit 1
            fi
          done

      - name: Install formulas and verify bottles are used
        run: |
          echo "=== Installing formulas (should use bottles) ==="
          for formula in fparser csxcad qcsxcad appcsxcad openems; do
            echo "--- Installing $formula ---"
            
            # Capture install output to check for bottle usage
            install_output=$(brew install "vincentfree/openems/$formula" 2>&1) || true
            echo "$install_output"
            
            # Check if it was poured from bottle (not built from source)
            if echo "$install_output" | grep -q "Pouring"; then
              echo "✅ $formula installed from bottle"
            elif echo "$install_output" | grep -q "already installed"; then
              echo "ℹ️  $formula was already installed"
              # Reinstall to verify bottle
              reinstall_output=$(brew reinstall "vincentfree/openems/$formula" 2>&1) || true
              echo "$reinstall_output"
              if echo "$reinstall_output" | grep -q "Pouring"; then
                echo "✅ $formula reinstalled from bottle"
              else
                echo "⚠️  Could not verify bottle for $formula (may have built from source)"
              fi
            else
              echo "⚠️  $formula may have been built from source"
              # Don't fail - bottle might not be available for this OS
            fi
          done

      - name: Smoketest - openEMS CLI
        run: |
          echo "=== Testing openEMS CLI ==="
          openEMS --help || true
          echo "=== Running test simulation ==="
          openEMS examples/test.xml --debug-PEC

      - name: Smoketest - Python bindings
        run: |
          echo "=== Setting up Python environment ==="
          python3 -m venv ~/openems-env
          source ~/openems-env/bin/activate
          pip install --upgrade pip
          pip install cython numpy matplotlib h5py setuptools

          echo "=== Installing CSXCAD Python bindings ==="
          CSXCAD_INSTALL_PATH=$(brew --prefix csxcad) pip install git+https://github.com/thliebig/CSXCAD.git#subdirectory=python --no-build-isolation

          echo "=== Installing openEMS Python bindings ==="
          CSXCAD_INSTALL_PATH=$(brew --prefix csxcad) OPENEMS_INSTALL_PATH=$(brew --prefix openems) pip install git+https://github.com/thliebig/openEMS.git#subdirectory=python --no-build-isolation

          echo "=== Running Python test ==="
          python examples/test_python.py